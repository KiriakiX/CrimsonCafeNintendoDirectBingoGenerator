  <div class="container">
  
  <button class="nd-button" (click)="generateCard()">
    Generate Bingo Card
  </button>

  <button class="nd-button" (click)="downloadImage()">
    Download Card
  </button>

    <canvas
      #bingoCanvas
      width="1190"
      height="1342"
      style="display:hidden">
    </canvas>

    <div *ngIf="generatedImage" class="result">
      <img
        [src]="generatedImage"
        style="max-width: 100%; border: 1px solid black;">
    </div>
</div>
